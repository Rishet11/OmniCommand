<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Table Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 40px;
    }
    h1 {
      color: #333;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
    }
    th {
      background-color: #333;
      color: white;
      padding: 12px;
      text-align: left;
      font-weight: bold;
    }
    td {
      border: 1px solid #ddd;
      padding: 10px;
    }
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
  <h1>3x3 Table Test</h1>
  <table>
    <thead>
      <tr>
        <th>English</th>
        <th>Hindi</th>
        <th>Chinese</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Hello</td>
        <td>नमस्ते</td>
        <td>你好</td>
      </tr>
      <tr>
        <td>World</td>
        <td>दुनिया</td>
        <td>世界</td>
      </tr>
      <tr>
        <td>Thanks</td>
        <td>धन्यवाद</td>
        <td>谢谢</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
